# Mission Control (TaskManager) CI/CD pipeline
# Required secrets: VPS_HOST, VPS_SSH_KEY

name: Deploy Mission Control

on:
  push:
    branches: [main]
    paths:
      - 'taskmanager/**'
      - '.github/workflows/deploy-taskmanager.yml'
  workflow_dispatch:

env:
  DEPLOY_DIR: /root/taskmanager

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: taskmanager/frontend
        run: npm ci

      - name: Build frontend
        working-directory: taskmanager/frontend
        run: npm run build

      - name: Verify frontend build
        run: |
          test -f taskmanager/frontend/dist/index.html || (echo "Frontend build failed" && exit 1)
          echo "Frontend build OK ($(du -sh taskmanager/frontend/dist | cut -f1))"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync source to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            --exclude '.env' \
            --exclude '.git' \
            --exclude '*.tsbuildinfo' \
            taskmanager/ root@${{ secrets.VPS_HOST }}:/root/taskmanager/

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.VPS_HOST }} \
            'bash /root/taskmanager/scripts/ci-deploy-remote.sh'
