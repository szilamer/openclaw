# Mission Control deploy — push main or manual trigger
# Secrets: VPS_HOST, VPS_SSH_KEY
name: Deploy Mission Control

on:
  push:
    branches: [main]
    paths:
      - 'taskmanager/**'
      - '.github/workflows/deploy-taskmanager.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend locally (for verify)
        working-directory: taskmanager/frontend
        run: npm ci && npm run build

      - name: SSH setup
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/key -o StrictHostKeyChecking=no" \
            --exclude node_modules --exclude .env --exclude .git --exclude '*.tsbuildinfo' \
            taskmanager/ root@${{ secrets.VPS_HOST }}:/root/taskmanager/

      - name: Deploy
        run: |
          ssh -i ~/.ssh/key -o StrictHostKeyChecking=no \
            root@${{ secrets.VPS_HOST }} \
            bash /root/taskmanager/scripts/ci-deploy-remote.sh
