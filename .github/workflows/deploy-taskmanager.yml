# Mission Control (TaskManager) deploy a Hetzner VPS-re
# Trigger: push to main
# Secrets: VPS_HOST, SSH_PRIVATE_KEY (Settings → Secrets and variables → Actions)
# Rsync a kódot a VPS-re – privát repo is működik, a VPS-nek nincs git hozzáférése.

name: Deploy TaskManager

on:
  push:
    branches: [main]
    paths:
      - 'taskmanager/**'
      - '.github/workflows/deploy-taskmanager.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync to VPS
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude node_modules --exclude 'backend/.env' --exclude dist --exclude .git \
            taskmanager/ root@${{ secrets.VPS_HOST }}:/root/taskmanager/

      - name: Build and restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/taskmanager

            test -f backend/.env || echo 'DATABASE_URL="postgresql://taskmanager:taskmanager@postgres:5432/taskmanager"' > backend/.env

            docker-compose build backend frontend
            docker rm -f taskmanager_backend_1 2>/dev/null || true
            docker-compose up -d backend frontend

            sleep 8
            docker-compose exec -T backend npx prisma migrate deploy 2>/dev/null || true

            mkdir -p /root/.openclaw/scripts
            cp scripts/taskmanager-api /root/.openclaw/scripts/
            chmod +x /root/.openclaw/scripts/taskmanager-api

            sleep 5
            curl -sf http://localhost:3000/api/health && echo " Backend OK"
            curl -sf -o /dev/null http://localhost:3010/ && echo "Frontend OK"
