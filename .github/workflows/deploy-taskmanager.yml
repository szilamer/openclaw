# Mission Control (TaskManager) CI/CD pipeline
# Trigger: push to main (taskmanager/** changes)
# Required secrets: VPS_HOST, VPS_SSH_KEY
# Optional secrets: SLACK_WEBHOOK (deploy notifications)

name: Deploy Mission Control

on:
  push:
    branches: [main]
    paths:
      - 'taskmanager/**'
      - '.github/workflows/deploy-taskmanager.yml'
  workflow_dispatch:

env:
  DEPLOY_DIR: /root/taskmanager

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            taskmanager/frontend/package-lock.json
            taskmanager/backend/package-lock.json

      - name: Build frontend
        working-directory: taskmanager/frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend build
        run: |
          test -f taskmanager/frontend/dist/index.html || (echo "Frontend build failed" && exit 1)
          echo "Frontend build OK ($(du -sh taskmanager/frontend/dist | cut -f1))"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync source to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            --exclude '.env' \
            --exclude '.git' \
            --exclude '*.tsbuildinfo' \
            taskmanager/ root@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_DIR }}/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /root/taskmanager

            echo "=== Building Docker images ==="
            docker compose build --no-cache backend frontend

            echo "=== Stopping old containers ==="
            docker compose stop backend frontend

            echo "=== Starting updated containers ==="
            docker compose up -d

            echo "=== Waiting for services ==="
            sleep 8

            echo "=== Running migrations ==="
            docker compose exec -T backend npx prisma migrate deploy 2>/dev/null || true

            echo "=== Health check ==="
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "Backend OK"
                break
              fi
              echo "Waiting for backend... ($i/5)"
              sleep 3
            done

            curl -sf -o /dev/null http://localhost:8080/ && echo "Frontend OK" || echo "Frontend check failed"

            echo "=== Cleaning old images ==="
            docker image prune -f > /dev/null 2>&1 || true

            echo "=== Deploy complete ==="
