# Mission Control (TaskManager) CI/CD pipeline
# Trigger: push to main (taskmanager/** changes)
# Required secrets: VPS_HOST, VPS_SSH_KEY

name: Deploy Mission Control

on:
  push:
    branches: [main]
    paths:
      - 'taskmanager/**'
      - '.github/workflows/deploy-taskmanager.yml'
  workflow_dispatch:

env:
  DEPLOY_DIR: /root/taskmanager

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            taskmanager/frontend/package-lock.json
            taskmanager/backend/package-lock.json

      - name: Build frontend
        working-directory: taskmanager/frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend build
        run: |
          test -f taskmanager/frontend/dist/index.html || (echo "Frontend build failed" && exit 1)
          echo "Frontend build OK ($(du -sh taskmanager/frontend/dist | cut -f1))"

      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          test -s ~/.ssh/deploy_key || { echo "VPS_SSH_KEY empty or missing"; exit 1; }
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync source to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          test -n "${VPS_HOST:-}" || { echo "VPS_HOST secret missing"; exit 1; }
          rsync -avz --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
            --exclude node_modules \
            --exclude '.env' \
            --exclude '.git' \
            --exclude '*.tsbuildinfo' \
            taskmanager/ "root@${VPS_HOST}:${DEPLOY_DIR}/"

      - name: Deploy on VPS (docker compose)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/deploy_key" \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            "root@${VPS_HOST}" \
            bash /root/taskmanager/scripts/ci-deploy-remote.sh
